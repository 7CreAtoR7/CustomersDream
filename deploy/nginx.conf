# Конфиг nginx для CustomersDream.
# Положить в /etc/nginx/sites-available/customersdream
# и сделать симлинк в /etc/nginx/sites-enabled/.
#
# ВАЖНО: замени your-domain.ru на свой реальный домен (в двух местах ниже).
# Блок с SSL (443) появится автоматически после запуска:
#   sudo certbot --nginx -d your-domain.ru

server {
    listen 80;
    server_name your-domain.ru www.your-domain.ru;

    # Лимит на размер загружаемых данных (на всякий случай)
    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Для WebSocket / keep-alive
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }
}
